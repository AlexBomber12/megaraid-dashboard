name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: pip install -e ".[dev]"

      - name: ruff check .
        run: ruff check .

      - name: ruff format --check .
        run: ruff format --check .

      - name: mypy src
        run: mypy src

      - name: pytest
        run: pytest
