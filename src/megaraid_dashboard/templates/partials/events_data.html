<div
  id="events-data"
  class="data-block"
  hx-get="{{ request.url_for('events_partial').path }}"
  hx-trigger="every 30s"
  hx-target="this"
  hx-swap="outerHTML"
>
  {% if view_model.events %}
    {% include "partials/events_table.html" %}
  {% else %}
    <section class="empty-state empty-state--centered">
      <h1>No events recorded yet.</h1>
    </section>
  {% endif %}
</div>
