<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}MegaRAID Dashboard{% endblock %}</title>
    <link
      rel="stylesheet"
      href="{{ request.url_for('static', path='css/app.css').path }}?v={{ static_asset_version }}"
    >
    <script
      src="{{ request.url_for('static', path='vendor/htmx.min.js').path }}?v={{ static_asset_version }}"
      defer
    ></script>
    <script
      src="{{ request.url_for('static', path='js/csrf.js').path }}?v={{ static_asset_version }}"
      defer
    ></script>
    <script
      src="{{ request.url_for('static', path='js/local-time.js').path }}?v={{ static_asset_version }}"
      defer
    ></script>
    <script
      src="{{ request.url_for('static', path='js/data-table.js').path }}?v={{ static_asset_version }}"
      defer
    ></script>
    <script
      src="{{ request.url_for('static', path='js/drive-actions.js').path }}?v={{ static_asset_version }}"
      defer
    ></script>
    {% block extra_scripts %}{% endblock %}
  </head>
  <body>
    <div class="app-shell">
      <header class="site-header">
        <div class="site-header__inner">
          <div class="site-header__left">
            <a class="brand" href="{{ request.url_for('overview').path }}">MegaRAID Dashboard</a>
            <nav class="site-nav" aria-label="Primary navigation">
              <a
                class="site-nav__link{% if active_nav == 'overview' %} site-nav__link--active{% endif %}"
                href="{{ request.url_for('overview').path }}"
              >Dashboard</a>
              <a
                class="site-nav__link{% if active_nav == 'drives' %} site-nav__link--active{% endif %}"
                href="{{ request.url_for('drives').path }}"
              >Drives</a>
              <a
                class="site-nav__link{% if active_nav == 'events' %} site-nav__link--active{% endif %}"
                href="{{ request.url_for('events').path }}"
              >Events</a>
            </nav>
          </div>
          <div class="site-header__actions">
            <noscript><time class="utc-clock">{{ current_utc_label }}</time></noscript>
            <time class="utc-clock" data-local-time-clock aria-live="off" hidden>{{ current_utc_label }}</time>
            <button
              class="button button--primary"
              type="button"
              hx-get="{{ request.url_for('overview_partial').path }}"
              hx-target="#data-block"
              hx-swap="outerHTML"
              hx-trigger="click"
            >Refresh</button>
          </div>
        </div>
      </header>

      <main class="content">
        {% block content %}{% endblock %}
      </main>

      <footer class="site-footer">
        <div class="site-footer__inner">
          Version {{ app_version }} | Build {{ build_sha[:8] }}
        </div>
      </footer>
    </div>
  </body>
</html>
